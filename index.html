<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dalaguete CARES</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1b4332;
      color: #fff;
      padding: 3rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; }
    header p  { margin-top: .5rem; opacity: .8; font-size: 1rem; }

    main {
      max-width: 680px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      flex: 1;
      text-align: center;
    }

    p { color: #374151; line-height: 1.7; margin-bottom: 1.5rem; }

    a.btn {
      display: inline-block;
      background: #1b4332;
      color: #fff;
      text-decoration: none;
      padding: .75rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: .95rem;
      transition: background .2s;
    }
    a.btn:hover { background: #2d6a4f; }

    footer {
      text-align: center;
      font-size: .82rem;
      color: #9ca3af;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Dalaguete CARES</h1>
  <p>Community Agricultural Records &amp; Extension System</p>
</header>

<main>
  <p>
    CARES is an internal field-validation mobile application for authorized
    AMIA personnel of the Local Government Unit of Dalaguete, Cebu, Philippines.
  </p>
  <a class="btn" href="privacy-policy.html">Privacy Policy</a>
</main>

<footer>
  &copy; 2026 LGU Dalaguete
</footer>

</body>
</html>
